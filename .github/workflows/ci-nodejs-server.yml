name: Node.js Server CI
on:
  pull_request:
    paths:
      - "server/nodejs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: ./server/nodejs
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create env file
        run: |
          # Pretty-printed JSON breaks .env (one var per line). Minify to a single line; write
          # from JS so JSON quotes never go through shell quoting.
          bun -e '
          const { writeFileSync } = require("node:fs");
          const compact = JSON.stringify(JSON.parse(process.env.ACCESS_CODE_CONFIGS ?? ""));
          writeFileSync(
            ".env",
            `JWT_SECRET=${process.env.JWT_SECRET}\nCOUNSEL_WEBHOOK_SECRET=${process.env.COUNSEL_WEBHOOK_SECRET}\nACCESS_CODE_CONFIGS=${compact}\n`,
          );
          '
          cat .env
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          COUNSEL_WEBHOOK_SECRET: ${{ secrets.COUNSEL_WEBHOOK_SECRET }}
          ACCESS_CODE_CONFIGS: ${{ secrets.ACCESS_CODE_CONFIGS }}

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Type Check
        run: bun run build

      - name: Compile
        run: bun run compile

      - name: Healthcheck
        run: bun run healthcheck
