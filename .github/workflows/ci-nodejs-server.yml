name: Node.js Server CI
on:
  pull_request:
    branches: [main]
    paths:
      - "server/nodejs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: ./server/nodejs
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create env file
        run: |
          touch .env
          echo JWT_SECRET=${JWT_SECRET} >> .env
          echo COUNSEL_WEBHOOK_SECRET=${COUNSEL_WEBHOOK_SECRET} >> .env
          printf 'ACCESS_CODE_CONFIGS=%s\n' "${ACCESS_CODE_CONFIGS}" >> .env
          cat .env
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          COUNSEL_WEBHOOK_SECRET: ${{ secrets.COUNSEL_WEBHOOK_SECRET }}
          ACCESS_CODE_CONFIGS: ${{ secrets.ACCESS_CODE_CONFIGS }}

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Type Check
        run: bun run build

      - name: Compile
        run: bun run compile

      - name: Healthcheck
        run: bun run healthcheck
