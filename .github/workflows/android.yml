name: Android

on:
  pull_request:
    paths:
      - "mobile/android/**"
      - ".github/workflows/android.yml"
  push:
    branches: [main]
    paths:
      - "mobile/android/**"
      - ".github/workflows/android.yml"

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/android/EmbeddedCounselDemo
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Detekt (static analysis + ktlint formatting)
        run: ./gradlew :app:detekt --no-daemon --stacktrace

      - name: Lint
        run: ./gradlew :app:lint --no-daemon --stacktrace

      - name: Unit tests
        run: ./gradlew :app:test --no-daemon --stacktrace

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload detekt report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: detekt-report
          path: mobile/android/EmbeddedCounselDemo/app/build/reports/detekt/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: app-debug
          path: mobile/android/EmbeddedCounselDemo/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 14
